name: diff-ai-mcp
description: AI-powered diff ai MCP server for agents. Supports diff texts, diff summary,
  word diff. By MEOK AI Labs.
version: 1.0.0
tools:
- name: diff_texts
  description: MEOK AI Labs tool.
  parameters:
  - name: text_a
    type: string
    required: true
  - name: text_b
    type: string
    required: true
- name: diff_summary
  description: MEOK AI Labs tool.
  parameters:
  - name: text_a
    type: string
    required: true
  - name: text_b
    type: string
    required: true
- name: word_diff
  description: MEOK AI Labs tool.
  parameters:
  - name: text_a
    type: string
    required: true
  - name: text_b
    type: string
    required: true
- name: similarity_score
  description: MEOK AI Labs tool.
  parameters:
  - name: text_a
    type: string
    required: true
  - name: text_b
    type: string
    required: true
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
    - apiKey
    properties:
      apiKey:
        type: string
        description: Your MEOK API Key
  commandFunction: "(config) => ({\n  command: 'uvx',\n  args: ['diff-ai-mcp', '--api-key',\
    \ config.apiKey],\n  env: {\n    MEOK_API_KEY: config.apiKey\n  }\n})"
